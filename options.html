<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SnB Settings</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="options-page">
  <main class="options-shell">
    <section class="settings-card" aria-labelledby="settings-title">
      <div class="gradient-rule"></div>
      <div class="settings-header">
        <div class="settings-mark" aria-hidden="true">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
            <g stroke="currentColor" stroke-width="14" stroke-linecap="round" fill="none">
              <line x1="82" y1="38" x2="82" y2="18"></line>
              <line x1="52" y1="52" x2="38" y2="38"></line>
              <line x1="40" y1="82" x2="18" y2="82"></line>
              <line x1="52" y1="112" x2="38" y2="126"></line>
              <line x1="112" y1="52" x2="126" y2="38"></line>
            </g>
            <path fill="currentColor" d="M95 65 C82 65 73 77 77 89 L120 211 C124 223 140 224 145 212 L165 156 L222 137 C235 133 237 116 225 111 L104 66 C101 65 98 65 95 65 Z"></path>
          </svg>
        </div>
        <div>
          <p class="eyebrow">SnB</p>
          <h1 id="settings-title">Settings</h1>
        </div>
      </div>

      <label class="field-label" for="apiKey">Groq API key</label>
      <input id="apiKey" class="text-input" type="password" placeholder="gsk_..." autocomplete="off">

      <div style="margin-top: 16px; margin-bottom: 8px; border-top: 1px solid var(--snb-hairline); padding-top: 16px;">
        <h2 style="margin: 0 0 12px 0; font-size: 16px; font-weight: 600; color: var(--snb-ink); font-family: var(--snb-font-sans);">Screenshots Hotkeys</h2>
      </div>

      <label class="field-label" for="hotkeyRect">Rectangle Selection Screenshot</label>
      <input id="hotkeyRect" class="text-input" type="text" placeholder="Click and press keys..." readonly style="cursor: pointer; caret-color: transparent;">

      <label class="field-label" for="hotkeyFull">Full Page Screenshot</label>
      <input id="hotkeyFull" class="text-input" type="text" placeholder="Click and press keys..." readonly style="cursor: pointer; caret-color: transparent;">

      <button id="save" class="primary-button" type="button" style="margin-top: 8px;">Save settings</button>
    </section>
  </main>
  <script src="options.js"></script>
</body>
</html>
